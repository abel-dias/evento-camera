<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Participante</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Participação ao Vivo</h1>

      <p class="descricao">
        Digite seu nome e permita o acesso à câmera para entrar na fila do telão.
      </p>

      <input
        id="nome"
        class="input"
        type="text"
        placeholder="Digite seu nome"
      />

      <button id="btnEntrar" class="btn">
        Entrar com a câmera
      </button>

      <p id="status" class="status">
        Aguardando entrada...
      </p>

      <video
        id="videoLocal"
        class="video-preview"
        autoplay
        muted
        playsinline
      ></video>
    </section>
  </main>

  <script>
    const SERVER_URL = "https://evento-camera-server.onrender.com";

    const socket = io(SERVER_URL, {
      transports: ["websocket", "polling"]
    });

    const btnEntrar = document.getElementById("btnEntrar");
    const nomeInput = document.getElementById("nome");
    const statusEl = document.getElementById("status");
    const videoLocal = document.getElementById("videoLocal");

    let localStream = null;

    const conexoes = {};
    const candidatosPendentes = {};

    const iceServers = [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
      { urls: "stun:stun2.l.google.com:19302" }
    ];

    socket.on("connect", () => {
      statusEl.textContent =
        "Conectado. Clique em entrar para liberar a câmera.";
    });

    socket.on("disconnect", () => {
      statusEl.textContent =
        "Conexão perdida. Recarregue a página se necessário.";
    });

    btnEntrar.addEventListener("click", async () => {
      try {
        btnEntrar.disabled = true;
        statusEl.textContent = "Solicitando acesso à câmera...";

        localStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        videoLocal.srcObject = localStream;
        await videoLocal.play();

        const nome = nomeInput.value.trim() || "Participante";

        socket.emit("entrar", {
          nome: nome
        });

        statusEl.textContent =
          "Você entrou na fila. Aguarde ser chamado no telão.";
      } catch (erro) {
        console.error("Erro ao abrir câmera:", erro);

        statusEl.textContent =
          "Não foi possível acessar a câmera. Verifique se você permitiu o acesso.";

        btnEntrar.disabled = false;
      }
    });

    socket.on("entradaConfirmada", () => {
      statusEl.textContent =
        "Câmera ativa. Aguarde ser selecionado pelo admin.";
    });

    socket.on("voceFoiSelecionado", () => {
      statusEl.textContent =
        "Você foi selecionado! Sua imagem aparecerá no telão.";
    });

    socket.on("offer", async (data) => {
      try {
        const remetenteId = data.sender;

        if (!localStream) {
          statusEl.textContent =
            "A câmera ainda não está ativa. Clique em Entrar com a câmera.";
          return;
        }

        const pc = await criarConexao(remetenteId);

        await pc.setRemoteDescription(
          new RTCSessionDescription(data.offer)
        );

        await processarCandidatosPendentes(remetenteId);

        const answer = await pc.createAnswer();

        await pc.setLocalDescription(answer);

        socket.emit("answer", {
          target: remetenteId,
          answer: answer
        });

        statusEl.textContent =
          "Câmera compartilhada com o admin/telão.";
      } catch (erro) {
        console.error("Erro ao responder offer:", erro);

        statusEl.textContent =
          "Erro ao iniciar transmissão. Recarregue a página e tente novamente.";
      }
    });

    socket.on("ice-candidate", async (data) => {
      await adicionarCandidato(data.sender, data.candidate);
    });

    socket.on("pararTransmissao", () => {
      fecharTodasConexoes();

      statusEl.textContent =
        "Transmissão encerrada. Você continua com a câmera aberta.";
    });

    async function criarConexao(destinoId) {
      fecharConexao(destinoId);

      candidatosPendentes[destinoId] = [];

      const pc = new RTCPeerConnection({
        iceServers: iceServers
      });

      conexoes[destinoId] = pc;

      localStream.getTracks().forEach((track) => {
        pc.addTrack(track, localStream);
      });

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit("ice-candidate", {
            target: destinoId,
            candidate: event.candidate
          });
        }
      };

      pc.onconnectionstatechange = () => {
        console.log("Estado participante:", destinoId, pc.connectionState);

        if (
          pc.connectionState === "failed" ||
          pc.connectionState === "closed"
        ) {
          fecharConexao(destinoId);
        }
      };

      return pc;
    }

    async function adicionarCandidato(remetenteId, candidate) {
      if (!candidate) return;

      const pc = conexoes[remetenteId];

      if (
        pc &&
        pc.remoteDescription &&
        pc.remoteDescription.type
      ) {
        try {
          await pc.addIceCandidate(
            new RTCIceCandidate(candidate)
          );
        } catch (erro) {
          console.error("Erro ICE participante:", erro);
        }
      } else {
        if (!candidatosPendentes[remetenteId]) {
          candidatosPendentes[remetenteId] = [];
        }

        candidatosPendentes[remetenteId].push(candidate);
      }
    }

    async function processarCandidatosPendentes(remetenteId) {
      const pc = conexoes[remetenteId];

      if (!pc) return;

      const lista = candidatosPendentes[remetenteId] || [];

      for (const candidate of lista) {
        try {
          await pc.addIceCandidate(
            new RTCIceCandidate(candidate)
          );
        } catch (erro) {
          console.error("Erro ao processar ICE pendente:", erro);
        }
      }

      candidatosPendentes[remetenteId] = [];
    }

    function fecharConexao(id) {
      if (conexoes[id]) {
        conexoes[id].close();
        delete conexoes[id];
      }

      if (candidatosPendentes[id]) {
        delete candidatosPendentes[id];
      }
    }

    function fecharTodasConexoes() {
      Object.keys(conexoes).forEach((id) => {
        fecharConexao(id);
      });
    }

    window.addEventListener("beforeunload", () => {
      fecharTodasConexoes();

      if (localStream) {
        localStream.getTracks().forEach((track) => {
          track.stop();
        });
      }
    });
  </script>
</body>
</html>

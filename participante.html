<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Participante</title>

<style>

body{
    font-family:Arial;
    text-align:center;
    background:#111;
    color:white;
    padding:20px;
}

video{
    width:90%;
    max-width:500px;
    border-radius:10px;
    margin-top:20px;
}

input{
    padding:10px;
    width:250px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#status{
    margin-top:15px;
    font-size:18px;
}

</style>
</head>

<body>

<h1>Participação ao Vivo</h1>

<input
id="nome"
placeholder="Digite seu nome">

<button onclick="entrar()">
Entrar
</button>

<br><br>

<video
id="camera"
autoplay
playsinline
muted>
</video>

<div id="status">
Aguardando entrada...
</div>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<script>

const socket =
io("https://evento-camera-server.onrender.com");

let localStream;
let pc = null;

async function entrar(){

    try{

        localStream =
        await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:false
        });

        document
            .getElementById("camera")
            .srcObject =
            localStream;

        const nome =
        document
            .getElementById("nome")
            .value;

        socket.emit("entrar",{
            nome
        });

        document
            .getElementById("status")
            .innerHTML =
            "Você entrou na fila.";

    }
    catch(erro){

        alert(
            "Permita acesso à câmera."
        );

    }

}

socket.on(
"participanteSelecionado",
(id)=>{

    if(id === socket.id){

        document
            .getElementById("status")
            .innerHTML =
            "🎉 Você está AO VIVO no telão!";

    }
    else{

        document
            .getElementById("status")
            .innerHTML =
            "Aguardando seleção...";

    }

});

socket.on("offer", async (data)=>{

    console.log("Recebeu OFFER", data);

    if(pc){

        pc.close();

    }

    pc = new RTCPeerConnection({

        iceServers:[
            {
                urls:"stun:stun.l.google.com:19302"
            }
        ]

    });

    localStream
        .getTracks()
        .forEach(track=>{

            pc.addTrack(
                track,
                localStream
            );

        });

    pc.onicecandidate = (event)=>{

        if(event.candidate){

            socket.emit(
                "ice-candidate",
                {
                    target:data.sender,
                    candidate:event.candidate
                }
            );

        }

    };

    await pc.setRemoteDescription(
        new RTCSessionDescription(
            data.offer
        )
    );

    const answer =
    await pc.createAnswer();

    await pc.setLocalDescription(
        answer
    );

    socket.emit(
        "answer",
        {
            target:data.sender,
            answer
        }
    );

});

socket.on(
"ice-candidate",
async(data)=>{

    if(pc){

        await pc.addIceCandidate(
            new RTCIceCandidate(
                data.candidate
            )
        );

    }

});

</script>

</body>
</html>

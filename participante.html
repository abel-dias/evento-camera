<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Participante</title>

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Participação ao Vivo</h1>

      <p class="descricao">
        Digite seu nome e permita o acesso à câmera para entrar na fila do telão.
      </p>

      <input
        id="nome"
        class="input"
        type="text"
        placeholder="Digite seu nome"
      />

      <button id="btnEntrar" class="btn">
        Entrar com a câmera
      </button>

      <p id="status" class="status">
        Aguardando entrada...
      </p>

      <video
        id="videoLocal"
        class="video-preview"
        autoplay
        muted
        playsinline
      ></video>
    </section>
  </main>

  <script>
    const SERVER_URL = "https://evento-camera-server.onrender.com";

    const socket = io(SERVER_URL, {
      transports: ["websocket", "polling"]
    });

    const btnEntrar = document.getElementById("btnEntrar");
    const nomeInput = document.getElementById("nome");
    const statusEl = document.getElementById("status");
    const videoLocal = document.getElementById("videoLocal");

    let localStream = null;
    let pc = null;
    let telaoId = null;

    const iceServers = [
      {
        urls: "stun:stun.l.google.com:19302"
      },
      {
        urls: "stun:stun1.l.google.com:19302"
      }
    ];

    socket.on("connect", () => {
      statusEl.textContent =
        "Conectado. Clique em entrar para liberar a câmera.";
    });

    socket.on("disconnect", () => {
      statusEl.textContent =
        "Conexão perdida. Recarregue a página se necessário.";
    });

    btnEntrar.addEventListener("click", async () => {
      try {
        btnEntrar.disabled = true;
        statusEl.textContent = "Solicitando acesso à câmera...";

        localStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: {
              ideal: 1280
            },
            height: {
              ideal: 720
            }
          },
          audio: false
        });

        videoLocal.srcObject = localStream;

        const nome = nomeInput.value.trim() || "Participante";

        socket.emit("entrar", {
          nome: nome
        });

        statusEl.textContent =
          "Você entrou na fila. Aguarde ser chamado no telão.";
      } catch (erro) {
        console.error(erro);

        statusEl.textContent =
          "Não foi possível acessar a câmera. Verifique se você permitiu o acesso.";

        btnEntrar.disabled = false;
      }
    });

    socket.on("entradaConfirmada", () => {
      statusEl.textContent =
        "Câmera ativa. Aguarde ser selecionado pelo admin.";
    });

    socket.on("voceFoiSelecionado", (data) => {
      telaoId = data.telaoId;

      statusEl.textContent =
        "Você foi selecionado! Sua imagem será exibida no telão.";
    });

    socket.on("offer", async (data) => {
      try {
        telaoId = data.sender;

        await criarConexao();

        await pc.setRemoteDescription(
          new RTCSessionDescription(data.offer)
        );

        const answer = await pc.createAnswer();

        await pc.setLocalDescription(answer);

        socket.emit("answer", {
          target: telaoId,
          answer: answer
        });

        statusEl.textContent = "Transmitindo para o telão.";
      } catch (erro) {
        console.error("Erro ao responder offer:", erro);
        statusEl.textContent = "Erro ao iniciar transmissão.";
      }
    });

    socket.on("ice-candidate", async (data) => {
      try {
        if (pc && data.candidate) {
          await pc.addIceCandidate(
            new RTCIceCandidate(data.candidate)
          );
        }
      } catch (erro) {
        console.error("Erro ICE participante:", erro);
      }
    });

    socket.on("pararTransmissao", () => {
      fecharConexao();

      statusEl.textContent =
        "Transmissão encerrada. Você continua com a câmera aberta.";
    });

    async function criarConexao() {
      fecharConexao();

      pc = new RTCPeerConnection({
        iceServers: iceServers
      });

      if (localStream) {
        localStream.getTracks().forEach((track) => {
          pc.addTrack(track, localStream);
        });
      }

      pc.onicecandidate = (event) => {
        if (event.candidate && telaoId) {
          socket.emit("ice-candidate", {
            target: telaoId,
            candidate: event.candidate
          });
        }
      };

      pc.onconnectionstatechange = () => {
        if (!pc) return;

        if (pc.connectionState === "connected") {
          statusEl.textContent = "Transmitindo ao vivo no telão.";
        }

        if (
          pc.connectionState === "failed" ||
          pc.connectionState === "disconnected" ||
          pc.connectionState === "closed"
        ) {
          statusEl.textContent =
            "Transmissão finalizada ou desconectada.";
        }
      };
    }

    function fecharConexao() {
      if (pc) {
        pc.close();
        pc = null;
      }
    }

    window.addEventListener("beforeunload", () => {
      fecharConexao();

      if (localStream) {
        localStream.getTracks().forEach((track) => {
          track.stop();
        });
      }
    });
  </script>
</body>
</html>

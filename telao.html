<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telão</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

video{
    width:100vw;
    height:100vh;
    object-fit:cover;
    background:black;
}

#status{
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    background:rgba(0,0,0,.6);
    padding:10px;
    border-radius:10px;
    font-family:Arial;
}
</style>

</head>
<body>

<div id="status">
Aguardando participante...
</div>

<video
id="video"
autoplay
playsinline>
</video>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<script>

const socket =
io("https://evento-camera-server.onrender.com");

socket.emit("registrarTelao");

let pc = null;

const video =
document.getElementById("video");

socket.on("iniciarVideo", async (participanteId)=>{

    document.getElementById("status")
    .innerHTML =
    "Conectando...";

    if(pc){

        pc.close();

    }

    pc = new RTCPeerConnection({

        iceServers:[
            {
                urls:"stun:stun.l.google.com:19302"
            }
        ]

    });

    pc.ontrack = (event)=>{

        video.srcObject =
        event.streams[0];

        document.getElementById("status")
        .innerHTML =
        "AO VIVO";

    };

    pc.onicecandidate = (event)=>{

        if(event.candidate){

            socket.emit(
                "ice-candidate",
                {
                    target:participanteId,
                    candidate:event.candidate
                }
            );

        }

    };

    const offer =
    await pc.createOffer();

    await pc.setLocalDescription(
        offer
    );

    socket.emit(
        "offer",
        {
            target:participanteId,
            offer
        }
    );

});

socket.on("answer", async (data)=>{

    await pc.setRemoteDescription(
        new RTCSessionDescription(
            data.answer
        )
    );

});

socket.on(
"ice-candidate",
async(data)=>{

    if(pc){

        await pc.addIceCandidate(
            new RTCIceCandidate(
                data.candidate
            )
        );

    }

});

</script>

</body>
</html>

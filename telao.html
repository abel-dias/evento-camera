<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telão do Evento</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>

  <style>
    @font-face {
  font-family: "FonteJunina";
  src: url("fonts/jun.woff2") format("woff2");
  font-weight: normal;
  font-style: normal;
}
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
      background:
        radial-gradient(circle at top, rgba(35, 86, 150, 0.25), transparent 30%),
        linear-gradient(180deg, #0b2340 0%, #07182d 42%, #0a1220 100%);
    }

    .telao {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
    }

    /* FUNDO */
    .fundo-luzes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.28;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255, 230, 140, 0.22) 0 8px, transparent 9px),
        radial-gradient(circle at 22% 70%, rgba(255, 170, 80, 0.16) 0 7px, transparent 8px),
        radial-gradient(circle at 75% 18%, rgba(255, 230, 140, 0.22) 0 8px, transparent 9px),
        radial-gradient(circle at 88% 74%, rgba(255, 170, 80, 0.16) 0 7px, transparent 8px),
        radial-gradient(circle at 55% 12%, rgba(255, 230, 140, 0.15) 0 8px, transparent 9px);
    }

    /* BANDEIRINHAS FIXAS NO TOPO */
    .topo-decorado {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 115px;
      z-index: 5;
      pointer-events: none;
    }

    .fio-topo {
      position: absolute;
      top: 22px;
      left: -2%;
      width: 104%;
      height: 3px;
      background: #4f2d16;
      border-radius: 999px;
      transform: rotate(1deg);
    }

    .bandeirinhas-fundo {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
    }

    .bandeirinhas-fundo span {
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 38px solid red;
      filter: drop-shadow(0 3px 2px rgba(0, 0, 0, 0.35));
    }

    .bandeirinhas-fundo span:nth-child(1) { border-top-color: #f5b031; }
    .bandeirinhas-fundo span:nth-child(2) { border-top-color: #d73c2f; }
    .bandeirinhas-fundo span:nth-child(3) { border-top-color: #2d74c4; }
    .bandeirinhas-fundo span:nth-child(4) { border-top-color: #3fa23f; }
    .bandeirinhas-fundo span:nth-child(5) { border-top-color: #f5a623; }
    .bandeirinhas-fundo span:nth-child(6) { border-top-color: #d73c2f; }
    .bandeirinhas-fundo span:nth-child(7) { border-top-color: #2d74c4; }
    .bandeirinhas-fundo span:nth-child(8) { border-top-color: #3fa23f; }
    .bandeirinhas-fundo span:nth-child(9) { border-top-color: #f5a623; }
    .bandeirinhas-fundo span:nth-child(10) { border-top-color: #d73c2f; }
    .bandeirinhas-fundo span:nth-child(11) { border-top-color: #2d74c4; }
    .bandeirinhas-fundo span:nth-child(12) { border-top-color: #3fa23f; }

    .lampadas-topo {
      position: absolute;
      top: 10px;
      left: 0;
      width: 100%;
      height: 60px;
    }

    .lampadas-topo span {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #ffd25f;
      border-radius: 50%;
      box-shadow:
        0 0 8px rgba(255, 210, 95, 0.9),
        0 0 16px rgba(255, 210, 95, 0.6),
        0 0 30px rgba(255, 210, 95, 0.35);
    }

    .lampadas-topo span::before {
      content: "";
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 10px;
      background: #4f2d16;
    }

    .lampadas-topo span:nth-child(1) { left: 5%; top: 10px; }
    .lampadas-topo span:nth-child(2) { left: 16%; top: 22px; }
    .lampadas-topo span:nth-child(3) { left: 28%; top: 8px; }
    .lampadas-topo span:nth-child(4) { left: 40%; top: 22px; }
    .lampadas-topo span:nth-child(5) { left: 52%; top: 10px; }
    .lampadas-topo span:nth-child(6) { left: 64%; top: 24px; }
    .lampadas-topo span:nth-child(7) { left: 76%; top: 8px; }
    .lampadas-topo span:nth-child(8) { left: 88%; top: 22px; }

    /* BOTÃO DOS AJUSTES */
    .botao-ajustes {
      position: absolute;
      top: 18px;
      right: 20px;
      z-index: 50;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    .botao-ajustes:hover {
      background: rgba(0, 0, 0, 0.88);
    }

    .painel-ajustes {
      position: absolute;
      top: 70px;
      right: 20px;
      z-index: 50;
      width: 250px;
      background: rgba(18, 10, 6, 0.96);
      border: 2px solid rgba(255, 215, 120, 0.35);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      display: none;
    }

    .painel-ajustes.aberto {
      display: block;
    }

    .painel-ajustes h3 {
      margin: 0 0 14px 0;
      font-size: 18px;
      color: #ffe07a;
    }

    .grupo-botoes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grupo-botoes button,
    .fechar-painel {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .grupo-botoes button {
      background: rgba(255, 255, 255, 0.14);
      color: white;
    }

    .grupo-botoes button:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .grupo-botoes button.ativo {
      background: #00c2ff;
      color: #07111f;
    }

    .fechar-painel {
      margin-top: 14px;
      width: 100%;
      background: #ffcc00;
      color: #161616;
    }

    .atalhos {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.75);
    }

    /* ÁREA CENTRAL */
    .area-central {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding-top: 38px;
    }

    .painel-festa {
      position: relative;
      padding: 90px 30px 30px 30px;
      border-radius: 30px;
      background: linear-gradient(180deg, #6e431e 0%, #5a3418 45%, #452611 100%);
      box-shadow:
        0 20px 48px rgba(0, 0, 0, 0.48),
        inset 0 0 0 4px rgba(255, 228, 170, 0.10),
        inset 0 0 0 12px rgba(75, 37, 12, 0.42);
      border: 7px solid #9d6734;
    }

    .painel-festa::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 22px;
      border: 4px solid rgba(204, 150, 93, 0.8);
      pointer-events: none;
    }

    /* QUADRO MENOR DE CIMA */
    .placa-titulo {
  position: absolute;
  top: -38px;
  left: 50%;
  transform: translateX(-50%);
  width: min(90%, 720px);
  z-index: 20;
}

    .placa-arraia {
      background: linear-gradient(180deg, #7c4c24 0%, #5a3418 100%);
      border: 5px solid #a46e39;
      border-radius: 24px;
      box-shadow:
        0 12px 25px rgba(0, 0, 0, 0.42),
        inset 0 0 0 3px rgba(255,255,255,0.08);
      padding: 16px 18px;
      position: relative;
      text-align: center;
    }

    .placa-arraia::before,
    .placa-arraia::after {
      content: "";
      position: absolute;
      top: 18px;
      width: 14px;
      height: 14px;
      background: #2f1809;
      border-radius: 50%;
      box-shadow: inset 0 2px 2px rgba(255,255,255,0.15);
    }

    .placa-arraia::before {
      left: 18px;
    }

    .placa-arraia::after {
      right: 18px;
    }

    titulo-arraia {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(26px, 3.4vw, 48px);
      white-space: nowrap;
      line-height: 1;
      font-weight: 900;
      color: transparent;
      background: linear-gradient(
        90deg,
        #e94735 0%,
        #f2b52f 25%,
        #5ca73b 50%,
        #2d63b5 75%,
        #d74a33 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 3px 0 rgba(45, 22, 8, 0.70),
        1px 1px 0 rgba(255, 243, 208, 0.10);
      letter-spacing: 1px;
    }

    .subtitulo-escola {
      margin-top: 8px;
      display: inline-block;
      background: #113769;
      border: 3px dashed #d9a642;
      border-radius: 16px;
      color: #fff3d1;
      font-weight: bold;
      font-size: clamp(14px, 1.5vw, 22px);
      padding: 10px 18px;
      line-height: 1.2;
    }

    /* DECORAÇÕES */
    .chapeu-palha {
      position: absolute;
      top: 34px;
      left: -32px;
      width: 90px;
      height: 52px;
      background: #d0a15c;
      border-radius: 50%;
      transform: rotate(-22deg);
      z-index: 14;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    .chapeu-palha::before {
      content: "";
      position: absolute;
      top: 10px;
      left: 18px;
      width: 52px;
      height: 30px;
      background: #c99447;
      border-radius: 50%;
    }

    .chapeu-palha::after {
      content: "";
      position: absolute;
      top: 18px;
      left: 10px;
      width: 70px;
      height: 8px;
      background: #b52e2e;
      border-radius: 999px;
    }

    .balao-junino {
      position: absolute;
      width: 76px;
      height: 104px;
      z-index: 8;
      filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.35));
    }

    .balao-junino::before {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0%, 100% 26%, 82% 74%, 50% 100%, 18% 74%, 0% 26%);
      background:
        linear-gradient(
          90deg,
          #e84534 0 20%,
          #f0b02f 20% 40%,
          #2d74c4 40% 60%,
          #5aa63b 60% 80%,
          #f6a130 80% 100%
        );
      border: 4px solid rgba(95, 43, 12, 0.95);
      box-sizing: border-box;
    }

    .balao-junino::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -22px;
      transform: translateX(-50%);
      width: 4px;
      height: 22px;
      background: #c99a62;
      box-shadow:
        -8px 10px 0 0 #d34435,
        0 10px 0 0 #2d74c4,
        8px 10px 0 0 #f0b02f;
    }

    .balao-esquerda {
      left: -44px;
      top: 150px;
      transform: rotate(-10deg);
    }

    .balao-direita {
      right: -42px;
      top: 130px;
      transform: rotate(8deg);
    }

    .girassol {
      position: absolute;
      bottom: 18px;
      left: -6px;
      width: 76px;
      height: 76px;
      background: #f4b531;
      border-radius: 50%;
      z-index: 8;
      box-shadow: 0 0 0 10px rgba(244,181,49,0.30);
    }

    .girassol::before {
      content: "";
      position: absolute;
      inset: 16px;
      background: #5e3518;
      border-radius: 50%;
    }

    .milho {
      position: absolute;
      bottom: 24px;
      left: 68px;
      width: 42px;
      height: 82px;
      background: #f3c242;
      border-radius: 50% 50% 42% 42%;
      z-index: 8;
      box-shadow: inset -8px -8px 0 rgba(0,0,0,0.14);
      transform: rotate(-10deg);
    }

    .milho::before,
    .milho::after {
      content: "";
      position: absolute;
      bottom: -4px;
      width: 28px;
      height: 48px;
      background: #3e8d3d;
      border-radius: 80% 10% 80% 10%;
      z-index: -1;
    }

    .milho::before {
      left: -16px;
      transform: rotate(-24deg);
    }

    .milho::after {
      right: -16px;
      transform: rotate(24deg) scaleX(-1);
    }

    .fogueira {
      position: absolute;
      right: 16px;
      bottom: 20px;
      width: 82px;
      height: 100px;
      z-index: 8;
    }

    .fogueira::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      width: 52px;
      height: 68px;
      background: radial-gradient(circle at 50% 85%, #ff7b00 0%, #ff9800 30%, #ffd54f 55%, transparent 60%);
      filter: blur(1px);
    }

    .fogueira::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%) rotate(10deg);
      width: 64px;
      height: 16px;
      background: #5a3115;
      border-radius: 12px;
      box-shadow:
        -14px -8px 0 0 #6b3c18,
        14px -8px 0 0 #6b3c18;
    }

    /* ÁREA DO VÍDEO */
    .janela-video {
      position: relative;
      background: #000;
      border-radius: 22px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.08),
        0 10px 20px rgba(0,0,0,0.35);
      transition: width 0.3s ease, height 0.3s ease;
      z-index: 5;
    }

    .tamanho-pequeno {
      width: min(32vw, 430px);
      height: min(44vh, 360px);
    }

    .tamanho-medio {
      width: min(42vw, 560px);
      height: min(54vh, 460px);
    }

    .tamanho-grande {
      width: min(54vw, 740px);
      height: min(64vh, 580px);
    }

    .tamanho-cheio {
      width: min(66vw, 900px);
      height: min(72vh, 650px);
    }

    .video-telao {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: black;
      display: block;
    }

    .nome-participante {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(17, 55, 105, 0.95);
      border: 4px dashed #d9a642;
      color: #fff3d1;
      padding: 15px 30px;
      border-radius: 999px;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      max-width: 86vw;
      z-index: 25;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }

    #statusTelao {
      display: none;
    }

    @media (max-width: 900px) {
      .topo-decorado {
        height: 80px;
      }

      .bandeirinhas-fundo span {
        border-left-width: 11px;
        border-right-width: 11px;
        border-top-width: 22px;
      }

      .lampadas-topo {
        display: none;
      }

      .botao-ajustes {
        top: 12px;
        right: 12px;
        padding: 10px 14px;
        font-size: 13px;
      }

      .painel-ajustes {
        top: 54px;
        right: 12px;
        width: 220px;
      }

      .area-central {
        padding-top: 18px;
      }

      .painel-festa {
        padding: 78px 16px 18px 16px;
      }

      .placa-titulo {
        top: -28px;
        width: 86%;
      }

     .titulo-arraia {
  margin: 0;
  font-family: "FonteJunina", Georgia, "Times New Roman", serif !important;
  font-size: clamp(40px, 5vw, 72px);
  white-space: nowrap;
  line-height: 1;
  font-weight: 900;
  letter-spacing: 3px;
  color: transparent;
  background: linear-gradient(
    90deg,
    #e94735 0%,
    #f2b52f 25%,
    #5ca73b 50%,
    #2d63b5 75%,
    #d74a33 100%
  );
  -webkit-background-clip: text;
  background-clip: text;
  text-shadow:
    0 3px 0 rgba(45, 22, 8, 0.70),
    1px 1px 0 rgba(255, 243, 208, 0.10);
}

      .subtitulo-escola {
  margin-top: 10px;
  display: inline-block;
  background: #113769;
  border: 3px dashed #d9a642;
  border-radius: 16px;
  color: #fff3d1;
  font-family: "FonteJunina", Arial, sans-serif !important;
  font-weight: bold;
  font-size: clamp(16px, 1.8vw, 26px);
  padding: 12px 22px;
  line-height: 1.2;
  letter-spacing: 2px;
}

      .chapeu-palha,
      .balao-junino,
      .milho,
      .girassol,
      .fogueira {
        display: none;
      }

      .tamanho-pequeno {
        width: 66vw;
        height: 38vh;
      }

      .tamanho-medio {
        width: 80vw;
        height: 48vh;
      }

      .tamanho-grande {
        width: 88vw;
        height: 56vh;
      }

      .tamanho-cheio {
        width: 94vw;
        height: 62vh;
      }

      .nome-participante {
        font-size: 22px;
        padding: 12px 22px;
        bottom: 16px;
      }
    }
    .titulo-arraia {
  font-family: "FonteJunina", Georgia, "Times New Roman", serif !important;
}

.subtitulo-escola {
  font-family: "FonteJunina", Arial, sans-serif !important;
}
  </style>
</head>

<body>
  <main class="telao">
    <div class="fundo-luzes"></div>

    <div class="topo-decorado">
      <div class="fio-topo"></div>

      <div class="lampadas-topo">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>

      <div class="bandeirinhas-fundo">
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <button class="botao-ajustes" onclick="alternarPainel()">
      ⚙ Ajustes
    </button>

    <div id="painelAjustes" class="painel-ajustes">
      <h3>Tamanho da câmera</h3>

      <div class="grupo-botoes">
        <button id="btnPequeno" onclick="mudarTamanho('pequeno')">Pequeno</button>
        <button id="btnMedio" onclick="mudarTamanho('medio')">Médio</button>
        <button id="btnGrande" onclick="mudarTamanho('grande')">Grande</button>
        <button id="btnCheio" onclick="mudarTamanho('cheio')">Cheio</button>
      </div>

      <button class="fechar-painel" onclick="fecharPainel()">Fechar</button>

      <div class="atalhos">
        Teclado:<br>
        1 = Pequeno<br>
        2 = Médio<br>
        3 = Grande<br>
        4 = Cheio
      </div>
    </div>

    <div class="area-central">
      <div class="painel-festa">
        <div class="placa-titulo">
          <div class="placa-arraia">
            <h1 class="titulo-arraia">ARRAIÁ JULINO</h1>
            <div class="subtitulo-escola">COLÉGIO LUCIA ALVES</div>
          </div>
        </div>

        <div class="chapeu-palha"></div>
        <div class="balao-junino balao-esquerda"></div>
        <div class="balao-junino balao-direita"></div>
        <div class="girassol"></div>
        <div class="milho"></div>
        <div class="fogueira"></div>

        <div id="caixaVideo" class="janela-video tamanho-medio">
          <video
            id="videoRemoto"
            class="video-telao"
            autoplay
            muted
            playsinline
          ></video>
        </div>
      </div>
    </div>

    <div id="nomeParticipante" class="nome-participante">
      Nenhum participante selecionado
    </div>

    <div id="statusTelao"></div>
  </main>

  <script>
    const SERVER_URL = "https://evento-camera-server.onrender.com";

    const socket = io(SERVER_URL, {
      transports: ["websocket", "polling"]
    });

    const videoRemoto = document.getElementById("videoRemoto");
    const statusTelao = document.getElementById("statusTelao");
    const nomeParticipante = document.getElementById("nomeParticipante");
    const caixaVideo = document.getElementById("caixaVideo");
    const painelAjustes = document.getElementById("painelAjustes");

    const btnPequeno = document.getElementById("btnPequeno");
    const btnMedio = document.getElementById("btnMedio");
    const btnGrande = document.getElementById("btnGrande");
    const btnCheio = document.getElementById("btnCheio");

    let pc = null;
    let participanteAtual = null;
    let remoteStream = null;
    let candidatosPendentes = [];

    const iceServers = [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
      { urls: "stun:stun2.l.google.com:19302" }
    ];

    function alternarPainel() {
      painelAjustes.classList.toggle("aberto");
    }

    function fecharPainel() {
      painelAjustes.classList.remove("aberto");
    }

    function mudarTamanho(tamanho) {
      caixaVideo.classList.remove(
        "tamanho-pequeno",
        "tamanho-medio",
        "tamanho-grande",
        "tamanho-cheio"
      );

      caixaVideo.classList.add("tamanho-" + tamanho);

      btnPequeno.classList.remove("ativo");
      btnMedio.classList.remove("ativo");
      btnGrande.classList.remove("ativo");
      btnCheio.classList.remove("ativo");

      if (tamanho === "pequeno") btnPequeno.classList.add("ativo");
      if (tamanho === "medio") btnMedio.classList.add("ativo");
      if (tamanho === "grande") btnGrande.classList.add("ativo");
      if (tamanho === "cheio") btnCheio.classList.add("ativo");

      localStorage.setItem("tamanhoTelao", tamanho);
    }

    function carregarTamanhoSalvo() {
      const tamanhoSalvo = localStorage.getItem("tamanhoTelao") || "medio";
      mudarTamanho(tamanhoSalvo);
    }

    document.addEventListener("keydown", function(event) {
      const tecla = event.key.toLowerCase();

      if (tecla === "1") mudarTamanho("pequeno");
      if (tecla === "2") mudarTamanho("medio");
      if (tecla === "3") mudarTamanho("grande");
      if (tecla === "4") mudarTamanho("cheio");
      if (tecla === "escape") fecharPainel();
    });

    document.addEventListener("click", function(event) {
      const clicouNoPainel = painelAjustes.contains(event.target);
      const clicouNoBotao = event.target.closest(".botao-ajustes");

      if (!clicouNoPainel && !clicouNoBotao) {
        fecharPainel();
      }
    });

    carregarTamanhoSalvo();

    socket.on("connect", function() {
      socket.emit("registrarTelao");
      statusTelao.textContent = "Telão conectado.";
    });

    socket.on("disconnect", function() {
      statusTelao.textContent = "Telão desconectado.";
    });

    socket.on("telaoRegistrado", function() {
      statusTelao.textContent = "Telão registrado.";
    });

    socket.on("iniciarVideo", async function(data) {
      try {
        participanteAtual = data.participante;
        nomeParticipante.textContent = participanteAtual.nome;
        statusTelao.textContent = "Conectando com " + participanteAtual.nome + "...";

        await criarConexao(participanteAtual.id);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        socket.emit("offer", {
          target: participanteAtual.id,
          offer: offer
        });
      } catch (erro) {
        console.error("Erro ao iniciar vídeo no telão:", erro);
        statusTelao.textContent = "Erro ao iniciar vídeo no telão.";
      }
    });

    socket.on("answer", async function(data) {
      try {
        if (!pc) return;

        await pc.setRemoteDescription(
          new RTCSessionDescription(data.answer)
        );

        await processarCandidatosPendentes();

        statusTelao.textContent = "Resposta recebida.";
      } catch (erro) {
        console.error("Erro ao receber answer:", erro);
      }
    });

    socket.on("ice-candidate", async function(data) {
      await adicionarCandidato(data.candidate);
    });

    socket.on("usuarioDesconectado", function(id) {
      if (participanteAtual && participanteAtual.id === id) {
        limparTelao();
      }
    });

    socket.on("limparTelao", function() {
      limparTelao();
    });

    async function criarConexao(idParticipante) {
      fecharConexao();

      candidatosPendentes = [];

      pc = new RTCPeerConnection({
        iceServers: iceServers
      });

      remoteStream = new MediaStream();
      videoRemoto.srcObject = remoteStream;

      pc.addTransceiver("video", {
        direction: "recvonly"
      });

      pc.ontrack = async function(event) {
        remoteStream.addTrack(event.track);
        videoRemoto.srcObject = remoteStream;

        try {
          await videoRemoto.play();
          statusTelao.textContent = "Participante ao vivo.";
        } catch (erro) {
          console.error("Erro ao dar play no vídeo:", erro);
          statusTelao.textContent = "Imagem recebida.";
        }
      };

      pc.onicecandidate = function(event) {
        if (event.candidate && idParticipante) {
          socket.emit("ice-candidate", {
            target: idParticipante,
            candidate: event.candidate
          });
        }
      };

      pc.onconnectionstatechange = function() {
        if (!pc) return;

        if (pc.connectionState === "connected") {
          statusTelao.textContent = "Participante ao vivo.";
        }

        if (pc.connectionState === "failed") {
          statusTelao.textContent = "Falha na conexão.";
        }

        if (pc.connectionState === "disconnected") {
          statusTelao.textContent = "Participante desconectado.";
        }
      };
    }

    async function adicionarCandidato(candidate) {
      if (!candidate) return;

      if (
        pc &&
        pc.remoteDescription &&
        pc.remoteDescription.type
      ) {
        try {
          await pc.addIceCandidate(
            new RTCIceCandidate(candidate)
          );
        } catch (erro) {
          console.error("Erro ao adicionar ICE telão:", erro);
        }
      } else {
        candidatosPendentes.push(candidate);
      }
    }

    async function processarCandidatosPendentes() {
      if (!pc) return;

      for (const candidate of candidatosPendentes) {
        try {
          await pc.addIceCandidate(
            new RTCIceCandidate(candidate)
          );
        } catch (erro) {
          console.error("Erro ao processar ICE pendente:", erro);
        }
      }

      candidatosPendentes = [];
    }

    function fecharConexao() {
      if (pc) {
        pc.close();
        pc = null;
      }

      if (remoteStream) {
        remoteStream.getTracks().forEach(function(track) {
          track.stop();
        });
        remoteStream = null;
      }
    }

    function limparTelao() {
      fecharConexao();
      participanteAtual = null;
      videoRemoto.srcObject = null;
      nomeParticipante.textContent = "Nenhum participante selecionado";
      statusTelao.textContent = "Aguardando participante...";
    }
  </script>
</body>
</html>

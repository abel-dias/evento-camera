<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telão do Evento</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      color: white;
      background:
        radial-gradient(circle at top, rgba(35, 86, 150, 0.35), transparent 30%),
        linear-gradient(180deg, #0b2340 0%, #07182d 42%, #0a1220 100%);
    }

    .telao {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
    }

    /* FUNDO */
    .fundo-luzes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(255, 230, 140, 0.22) 0 8px, transparent 9px),
        radial-gradient(circle at 22% 70%, rgba(255, 170, 80, 0.16) 0 7px, transparent 8px),
        radial-gradient(circle at 75% 18%, rgba(255, 230, 140, 0.22) 0 8px, transparent 9px),
        radial-gradient(circle at 88% 74%, rgba(255, 170, 80, 0.16) 0 7px, transparent 8px),
        radial-gradient(circle at 55% 12%, rgba(255, 230, 140, 0.15) 0 8px, transparent 9px);
    }

    .cordao-lampadas {
      position: absolute;
      top: 8px;
      left: -2%;
      width: 104%;
      height: 90px;
      z-index: 2;
      pointer-events: none;
    }

    .fio {
      position: absolute;
      top: 12px;
      left: 0;
      width: 100%;
      height: 3px;
      background: #2f2117;
      transform: rotate(2deg);
      border-radius: 999px;
    }

    .lampada {
      position: absolute;
      top: 14px;
      width: 20px;
      height: 20px;
      background: #ffd25f;
      border-radius: 50%;
      box-shadow:
        0 0 8px rgba(255, 210, 95, 0.9),
        0 0 18px rgba(255, 210, 95, 0.7),
        0 0 32px rgba(255, 210, 95, 0.4);
    }

    .lampada::before {
      content: "";
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 12px;
      background: #2f2117;
    }

    .lampada:nth-child(2) { left: 4%; top: 32px; }
    .lampada:nth-child(3) { left: 12%; top: 18px; }
    .lampada:nth-child(4) { left: 24%; top: 36px; }
    .lampada:nth-child(5) { left: 36%; top: 14px; }
    .lampada:nth-child(6) { left: 50%; top: 32px; }
    .lampada:nth-child(7) { left: 64%; top: 16px; }
    .lampada:nth-child(8) { left: 76%; top: 34px; }
    .lampada:nth-child(9) { left: 88%; top: 18px; }
    .lampada:nth-child(10) { left: 96%; top: 30px; }

    /* BOTÃO DOS AJUSTES */
    .botao-ajustes {
      position: absolute;
      top: 22px;
      right: 26px;
      z-index: 40;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
    }

    .botao-ajustes:hover {
      background: rgba(0, 0, 0, 0.88);
    }

    .painel-ajustes {
      position: absolute;
      top: 76px;
      right: 26px;
      z-index: 40;
      width: 260px;
      background: rgba(18, 10, 6, 0.96);
      border: 2px solid rgba(255, 215, 120, 0.35);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      display: none;
    }

    .painel-ajustes.aberto {
      display: block;
    }

    .painel-ajustes h3 {
      margin: 0 0 14px 0;
      font-size: 18px;
      color: #ffe07a;
    }

    .grupo-botoes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grupo-botoes button,
    .fechar-painel {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }

    .grupo-botoes button {
      background: rgba(255, 255, 255, 0.14);
      color: white;
    }

    .grupo-botoes button:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .grupo-botoes button.ativo {
      background: #00c2ff;
      color: #07111f;
    }

    .fechar-painel {
      margin-top: 14px;
      width: 100%;
      background: #ffcc00;
      color: #161616;
    }

    .atalhos {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.75);
    }

    /* ÁREA CENTRAL */
    .area-central {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding-top: 34px;
    }

    .painel-festa {
      position: relative;
      padding: 110px 40px 42px 40px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, #5a3418 0%, #6d3e1b 45%, #4d2a12 100%);
      box-shadow:
        0 20px 48px rgba(0, 0, 0, 0.48),
        inset 0 0 0 4px rgba(255, 228, 170, 0.10),
        inset 0 0 0 12px rgba(75, 37, 12, 0.42);
      border: 7px solid #7b4a23;
      overflow: visible;
    }

    .painel-festa::before {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 26px;
      border: 5px solid #b98a52;
      pointer-events: none;
      box-shadow: inset 0 0 0 2px rgba(255, 235, 190, 0.12);
    }

    /* CORDA DA MOLDURA */
    .corda-moldura {
      position: absolute;
      inset: 14px;
      border: 8px solid #b67a3b;
      border-radius: 28px;
      pointer-events: none;
      z-index: 2;
      opacity: 0.95;
    }

    /* PLAQUINHA PRINCIPAL */
    .placa-titulo {
      position: absolute;
      top: -70px;
      left: 50%;
      transform: translateX(-50%);
      width: min(90%, 850px);
      z-index: 8;
      text-align: center;
    }

    .placa-arraia {
      background:
        linear-gradient(180deg, #6f4423 0%, #513115 100%);
      border: 6px solid #8f5b2c;
      border-radius: 26px;
      box-shadow:
        0 12px 25px rgba(0, 0, 0, 0.42),
        inset 0 0 0 3px rgba(255,255,255,0.08);
      padding: 16px 24px 18px 24px;
      position: relative;
    }

    .placa-arraia::before,
    .placa-arraia::after {
      content: "";
      position: absolute;
      top: 18px;
      width: 16px;
      height: 16px;
      background: #2f1809;
      border-radius: 50%;
      box-shadow: inset 0 2px 2px rgba(255,255,255,0.15);
    }

    .placa-arraia::before {
      left: 20px;
    }

    .placa-arraia::after {
      right: 20px;
    }

    .titulo-arraia {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(36px, 5vw, 82px);
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 1px;
      color: transparent;
      background: linear-gradient(
        90deg,
        #e94735 0%,
        #f2b52f 20%,
        #5ca73b 40%,
        #2d63b5 60%,
        #d74a33 80%,
        #4fb26b 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 4px 0 rgba(45, 22, 8, 0.75),
        2px 2px 0 rgba(255, 243, 208, 0.15);
    }

    .faixa-junino {
      margin: 10px auto 10px auto;
      display: inline-block;
      background: linear-gradient(180deg, #f0b02f 0%, #d58518 100%);
      color: #132a58;
      font-weight: 900;
      font-size: clamp(22px, 3.3vw, 52px);
      padding: 10px 26px;
      border-radius: 16px;
      box-shadow: 0 6px 0 #a55c0f;
      letter-spacing: 1px;
    }

    .subtitulo-escola {
      margin-top: 10px;
      display: inline-block;
      background: #113769;
      border: 4px dashed #d9a642;
      border-radius: 18px;
      color: #fff3d1;
      font-weight: bold;
      font-size: clamp(16px, 1.8vw, 26px);
      padding: 10px 20px;
      line-height: 1.2;
    }

    /* BANDEIRINHAS */
    .bandeirinhas-topo {
      position: absolute;
      top: -4px;
      left: -2%;
      width: 104%;
      display: flex;
      justify-content: center;
      gap: 8px;
      z-index: 12;
      pointer-events: none;
    }

    .bandeirinhas-topo span {
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 42px solid red;
      filter: drop-shadow(0 3px 2px rgba(0, 0, 0, 0.35));
    }

    .bandeirinhas-topo span:nth-child(1) { border-top-color: #f5b031; }
    .bandeirinhas-topo span:nth-child(2) { border-top-color: #d73c2f; }
    .bandeirinhas-topo span:nth-child(3) { border-top-color: #2d74c4; }
    .bandeirinhas-topo span:nth-child(4) { border-top-color: #f5a623; }
    .bandeirinhas-topo span:nth-child(5) { border-top-color: #d73c2f; }
    .bandeirinhas-topo span:nth-child(6) { border-top-color: #3fa23f; }
    .bandeirinhas-topo span:nth-child(7) { border-top-color: #f5a623; }
    .bandeirinhas-topo span:nth-child(8) { border-top-color: #d73c2f; }
    .bandeirinhas-topo span:nth-child(9) { border-top-color: #2d74c4; }
    .bandeirinhas-topo span:nth-child(10) { border-top-color: #3fa23f; }

    /* CHAPÉU */
    .chapeu-palha {
      position: absolute;
      top: 18px;
      left: -26px;
      width: 120px;
      height: 70px;
      background: #d0a15c;
      border-radius: 50%;
      transform: rotate(-22deg);
      z-index: 11;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
    }

    .chapeu-palha::before {
      content: "";
      position: absolute;
      top: 14px;
      left: 24px;
      width: 70px;
      height: 44px;
      background: #c99447;
      border-radius: 50%;
    }

    .chapeu-palha::after {
      content: "";
      position: absolute;
      top: 26px;
      left: 12px;
      width: 96px;
      height: 10px;
      background: #b52e2e;
      border-radius: 999px;
    }

    /* BALÕES JUNINOS */
    .balao-junino {
      position: absolute;
      width: 90px;
      height: 120px;
      z-index: 6;
      filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.35));
    }

    .balao-junino::before {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0%, 100% 26%, 82% 74%, 50% 100%, 18% 74%, 0% 26%);
      background:
        linear-gradient(
          90deg,
          #e84534 0 20%,
          #f0b02f 20% 40%,
          #2d74c4 40% 60%,
          #5aa63b 60% 80%,
          #f6a130 80% 100%
        );
      border: 4px solid rgba(95, 43, 12, 0.95);
      box-sizing: border-box;
    }

    .balao-junino::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -24px;
      transform: translateX(-50%);
      width: 4px;
      height: 24px;
      background: #c99a62;
      box-shadow:
        -8px 10px 0 0 #d34435,
        0 10px 0 0 #2d74c4,
        8px 10px 0 0 #f0b02f;
    }

    .balao-esquerda {
      left: -56px;
      top: 150px;
      transform: rotate(-10deg);
    }

    .balao-direita {
      right: -50px;
      top: 120px;
      transform: rotate(8deg);
    }

    /* DECORAÇÕES */
    .milho {
      position: absolute;
      bottom: 26px;
      width: 48px;
      height: 92px;
      background: #f3c242;
      border-radius: 50% 50% 42% 42%;
      z-index: 6;
      box-shadow: inset -8px -8px 0 rgba(0,0,0,0.14);
    }

    .milho::before,
    .milho::after {
      content: "";
      position: absolute;
      bottom: -4px;
      width: 34px;
      height: 60px;
      background: #3e8d3d;
      border-radius: 80% 10% 80% 10%;
      z-index: -1;
    }

    .milho::before {
      left: -18px;
      transform: rotate(-24deg);
    }

    .milho::after {
      right: -18px;
      transform: rotate(24deg) scaleX(-1);
    }

    .milho-esquerda {
      left: 18px;
      transform: rotate(-8deg);
    }

    .girassol {
      position: absolute;
      bottom: 18px;
      left: -10px;
      width: 90px;
      height: 90px;
      background: #f4b531;
      border-radius: 50%;
      z-index: 5;
      box-shadow:
        0 0 0 12px rgba(244,181,49,0.35);
    }

    .girassol::before {
      content: "";
      position: absolute;
      inset: 18px;
      background: #5e3518;
      border-radius: 50%;
    }

    .fogueira {
      position: absolute;
      right: 18px;
      bottom: 24px;
      width: 90px;
      height: 110px;
      z-index: 5;
    }

    .fogueira::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      width: 56px;
      height: 72px;
      background: radial-gradient(circle at 50% 85%, #ff7b00 0%, #ff9800 30%, #ffd54f 55%, transparent 60%);
      filter: blur(1px);
    }

    .fogueira::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%) rotate(10deg);
      width: 70px;
      height: 18px;
      background: #5a3115;
      border-radius: 12px;
      box-shadow:
        -16px -8px 0 0 #6b3c18,
        16px -8px 0 0 #6b3c18;
    }

    /* ÁREA DO VÍDEO */
    .janela-video {
      position: relative;
      background: #000;
      border-radius: 22px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        inset 0 0 0 4px rgba(255,255,255,0.08),
        0 10px 20px rgba(0,0,0,0.35);
      transition: width 0.3s ease, height 0.3s ease;
      z-index: 5;
    }

    .tamanho-pequeno {
      width: min(34vw, 460px);
      height: min(46vh, 390px);
    }

    .tamanho-medio {
      width: min(46vw, 620px);
      height: min(58vh, 500px);
    }

    .tamanho-grande {
      width: min(58vw, 800px);
      height: min(68vh, 620px);
    }

    .tamanho-cheio {
      width: min(70vw, 980px);
      height: min(74vh, 700px);
    }

    .video-telao {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: black;
      display: block;
    }

    .nome-participante {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(17, 55, 105, 0.95);
      border: 4px dashed #d9a642;
      color: #fff3d1;
      padding: 15px 30px;
      border-radius: 999px;
      font-size: 30px;
      font-weight: bold;
      text-align: center;
      max-width: 86vw;
      z-index: 25;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }

    /* status escondido */
    #statusTelao {
      display: none;
    }

    @media (max-width: 900px) {
      .botao-ajustes {
        top: 14px;
        right: 14px;
        padding: 10px 14px;
        font-size: 13px;
      }

      .painel-ajustes {
        top: 58px;
        right: 14px;
        width: 220px;
      }

      .area-central {
        padding-top: 24px;
      }

      .painel-festa {
        padding: 92px 18px 22px 18px;
      }

      .placa-titulo {
        top: -58px;
        width: 94%;
      }

      .faixa-junino {
        font-size: 22px;
        padding: 8px 18px;
      }

      .subtitulo-escola {
        font-size: 14px;
        padding: 8px 12px;
      }

      .bandeirinhas-topo span {
        border-left-width: 12px;
        border-right-width: 12px;
        border-top-width: 24px;
      }

      .chapeu-palha,
      .balao-junino,
      .milho,
      .girassol,
      .fogueira {
        display: none;
      }

      .tamanho-pequeno {
        width: 66vw;
        height: 40vh;
      }

      .tamanho-medio {
        width: 80vw;
        height: 50vh;
      }

      .tamanho-grande {
        width: 88vw;
        height: 58vh;
      }

      .tamanho-cheio {
        width: 94vw;
        height: 64vh;
      }

      .nome-participante {
        font-size: 22px;
        padding: 12px 22px;
        bottom: 18px;
      }
    }
  </style>
</head>

<body>
  <main class="telao">
    <div class="fundo-luzes"></div>

    <div class="cordao-lampadas">
      <div class="fio"></div>
      <div class="lampada"></div>
      <div class="lampada"></div>
      <div class="lampada"></div>
      <div class="lampada"></div>
      <div class="lampada"></div>
      <div class="lampada"></div>
      <div class="lampada"></div>
      <div class="lampada"></div>
      <div class="lampada"></div>
    </div>

    <button class="botao-ajustes" onclick="alternarPainel()">
      ⚙ Ajustes
    </button>

    <div id="painelAjustes" class="painel-ajustes">
      <h3>Tamanho da câmera</h3>

      <div class="grupo-botoes">
        <button id="btnPequeno" onclick="mudarTamanho('pequeno')">Pequeno</button>
        <button id="btnMedio" onclick="mudarTamanho('medio')">Médio</button>
        <button id="btnGrande" onclick="mudarTamanho('grande')">Grande</button>
        <button id="btnCheio" onclick="mudarTamanho('cheio')">Cheio</button>
      </div>

      <button class="fechar-painel" onclick="fecharPainel()">Fechar</button>

      <div class="atalhos">
        Teclado:<br>
        1 = Pequeno<br>
        2 = Médio<br>
        3 = Grande<br>
        4 = Cheio
      </div>
    </div>

    <div class="area-central">
      <div class="painel-festa">

        <div class="corda-moldura"></div>

        <div class="bandeirinhas-topo">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="chapeu-palha"></div>

        <div class="placa-titulo">
          <div class="placa-arraia">
            <h1 class="titulo-arraia">ARRAIÁ</h1>
            <div class="faixa-junino">JUNINO</div><br>
            <div class="subtitulo-escola">COLÉGIO ESTADUAL<br>LÚCIA ALVES</div>
          </div>
        </div>

        <div class="balao-junino balao-esquerda"></div>
        <div class="balao-junino balao-direita"></div>

        <div class="girassol"></div>
        <div class="milho milho-esquerda"></div>
        <div class="fogueira"></div>

        <div id="caixaVideo" class="janela-video tamanho-medio">
          <video
            id="videoRemoto"
            class="video-telao"
            autoplay
            muted
            playsinline
          ></video>
        </div>
      </div>
    </div>

    <div id="nomeParticipante" class="nome-participante">
      Nenhum participante selecionado
    </div>

    <div id="statusTelao"></div>
  </main>

  <script>
    const SERVER_URL = "https://evento-camera-server.onrender.com";

    const socket = io(SERVER_URL, {
      transports: ["websocket", "polling"]
    });

    const videoRemoto = document.getElementById("videoRemoto");
    const statusTelao = document.getElementById("statusTelao");
    const nomeParticipante = document.getElementById("nomeParticipante");
    const caixaVideo = document.getElementById("caixaVideo");
    const painelAjustes = document.getElementById("painelAjustes");

    const btnPequeno = document.getElementById("btnPequeno");
    const btnMedio = document.getElementById("btnMedio");
    const btnGrande = document.getElementById("btnGrande");
    const btnCheio = document.getElementById("btnCheio");

    let pc = null;
    let participanteAtual = null;
    let remoteStream = null;
    let candidatosPendentes = [];

    const iceServers = [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
      { urls: "stun:stun2.l.google.com:19302" }
    ];

    function alternarPainel() {
      painelAjustes.classList.toggle("aberto");
    }

    function fecharPainel() {
      painelAjustes.classList.remove("aberto");
    }

    function mudarTamanho(tamanho) {
      caixaVideo.classList.remove(
        "tamanho-pequeno",
        "tamanho-medio",
        "tamanho-grande",
        "tamanho-cheio"
      );

      caixaVideo.classList.add("tamanho-" + tamanho);

      btnPequeno.classList.remove("ativo");
      btnMedio.classList.remove("ativo");
      btnGrande.classList.remove("ativo");
      btnCheio.classList.remove("ativo");

      if (tamanho === "pequeno") btnPequeno.classList.add("ativo");
      if (tamanho === "medio") btnMedio.classList.add("ativo");
      if (tamanho === "grande") btnGrande.classList.add("ativo");
      if (tamanho === "cheio") btnCheio.classList.add("ativo");

      localStorage.setItem("tamanhoTelao", tamanho);
    }

    function carregarTamanhoSalvo() {
      const tamanhoSalvo = localStorage.getItem("tamanhoTelao") || "medio";
      mudarTamanho(tamanhoSalvo);
    }

    document.addEventListener("keydown", function(event) {
      const tecla = event.key.toLowerCase();

      if (tecla === "1") mudarTamanho("pequeno");
      if (tecla === "2") mudarTamanho("medio");
      if (tecla === "3") mudarTamanho("grande");
      if (tecla === "4") mudarTamanho("cheio");
      if (tecla === "escape") fecharPainel();
    });

    document.addEventListener("click", function(event) {
      const clicouNoPainel = painelAjustes.contains(event.target);
      const clicouNoBotao = event.target.closest(".botao-ajustes");

      if (!clicouNoPainel && !clicouNoBotao) {
        fecharPainel();
      }
    });

    carregarTamanhoSalvo();

    socket.on("connect", function() {
      socket.emit("registrarTelao");
      statusTelao.textContent = "Telão conectado.";
    });

    socket.on("disconnect", function() {
      statusTelao.textContent = "Telão desconectado.";
    });

    socket.on("telaoRegistrado", function() {
      statusTelao.textContent = "Telão registrado.";
    });

    socket.on("iniciarVideo", async function(data) {
      try {
        participanteAtual = data.participante;
        nomeParticipante.textContent = participanteAtual.nome;
        statusTelao.textContent = "Conectando com " + participanteAtual.nome + "...";

        await criarConexao(participanteAtual.id);

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        socket.emit("offer", {
          target: participanteAtual.id,
          offer: offer
        });
      } catch (erro) {
        console.error("Erro ao iniciar vídeo no telão:", erro);
        statusTelao.textContent = "Erro ao iniciar vídeo no telão.";
      }
    });

    socket.on("answer", async function(data) {
      try {
        if (!pc) return;

        await pc.setRemoteDescription(
          new RTCSessionDescription(data.answer)
        );

        await processarCandidatosPendentes();

        statusTelao.textContent = "Resposta recebida.";
      } catch (erro) {
        console.error("Erro ao receber answer:", erro);
      }
    });

    socket.on("ice-candidate", async function(data) {
      await adicionarCandidato(data.candidate);
    });

    socket.on("usuarioDesconectado", function(id) {
      if (participanteAtual && participanteAtual.id === id) {
        limparTelao();
      }
    });

    socket.on("limparTelao", function() {
      limparTelao();
    });

    async function criarConexao(idParticipante) {
      fecharConexao();

      candidatosPendentes = [];

      pc = new RTCPeerConnection({
        iceServers: iceServers
      });

      remoteStream = new MediaStream();
      videoRemoto.srcObject = remoteStream;

      pc.addTransceiver("video", {
        direction: "recvonly"
      });

      pc.ontrack = async function(event) {
        remoteStream.addTrack(event.track);
        videoRemoto.srcObject = remoteStream;

        try {
          await videoRemoto.play();
          statusTelao.textContent = "Participante ao vivo.";
        } catch (erro) {
          console.error("Erro ao dar play no vídeo:", erro);
          statusTelao.textContent = "Imagem recebida.";
        }
      };

      pc.onicecandidate = function(event) {
        if (event.candidate && idParticipante) {
          socket.emit("ice-candidate", {
            target: idParticipante,
            candidate: event.candidate
          });
        }
      };

      pc.onconnectionstatechange = function() {
        if (!pc) return;

        if (pc.connectionState === "connected") {
          statusTelao.textContent = "Participante ao vivo.";
        }

        if (pc.connectionState === "failed") {
          statusTelao.textContent = "Falha na conexão.";
        }

        if (pc.connectionState === "disconnected") {
          statusTelao.textContent = "Participante desconectado.";
        }
      };
    }

    async function adicionarCandidato(candidate) {
      if (!candidate) return;

      if (
        pc &&
        pc.remoteDescription &&
        pc.remoteDescription.type
      ) {
        try {
          await pc.addIceCandidate(
            new RTCIceCandidate(candidate)
          );
        } catch (erro) {
          console.error("Erro ao adicionar ICE telão:", erro);
        }
      } else {
        candidatosPendentes.push(candidate);
      }
    }

    async function processarCandidatosPendentes() {
      if (!pc) return;

      for (const candidate of candidatosPendentes) {
        try {
          await pc.addIceCandidate(
            new RTCIceCandidate(candidate)
          );
        } catch (erro) {
          console.error("Erro ao processar ICE pendente:", erro);
        }
      }

      candidatosPendentes = [];
    }

    function fecharConexao() {
      if (pc) {
        pc.close();
        pc = null;
      }

      if (remoteStream) {
        remoteStream.getTracks().forEach(function(track) {
          track.stop();
        });
        remoteStream = null;
      }
    }

    function limparTelao() {
      fecharConexao();
      participanteAtual = null;
      videoRemoto.srcObject = null;
      nomeParticipante.textContent = "Nenhum participante selecionado";
      statusTelao.textContent = "Aguardando participante...";
    }
  </script>
</body>
</html>

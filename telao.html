<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Telão do Evento</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: white;
    }

    .body-telao {
      background: black;
      overflow: hidden;
    }

    .telao {
      width: 100vw;
      height: 100vh;
      position: relative;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .topo-telao {
      position: absolute;
      top: 25px;
      left: 35px;
      z-index: 10;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.8);
    }

    .topo-telao h1 {
      margin: 0;
      font-size: 42px;
    }

    .topo-telao p {
      margin: 8px 0 0;
      font-size: 22px;
      color: #ffdf7e;
    }

    .controles-tamanho {
      position: absolute;
      top: 25px;
      right: 35px;
      z-index: 20;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .controles-tamanho button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.18);
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }

    .controles-tamanho button:hover {
      background: rgba(255, 255, 255, 0.32);
    }

    .controles-tamanho button.ativo {
      background: #00c2ff;
      color: #07111f;
    }

    .btn-ocultar {
      background: rgba(255, 204, 0, 0.9) !important;
      color: #111 !important;
    }

    .controles-tamanho.oculto {
      display: none;
    }

    .caixa-video {
      background: rgba(0, 0, 0, 0.65);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.45);
      position: relative;
      z-index: 2;
      transition: width 0.3s ease, height 0.3s ease;
    }

    .tamanho-pequeno {
      width: min(40vw, 520px);
      height: min(60vh, 520px);
      max-width: 90vw;
      max-height: 80vh;
    }

    .tamanho-medio {
      width: min(58vw, 800px);
      height: min(74vh, 700px);
      max-width: 92vw;
      max-height: 82vh;
    }

    .tamanho-grande {
      width: min(75vw, 1000px);
      height: min(84vh, 820px);
      max-width: 95vw;
      max-height: 88vh;
    }

    .tamanho-cheio {
      width: 92vw;
      height: 88vh;
      max-width: 92vw;
      max-height: 88vh;
    }

    .video-telao {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: black;
      display: block;
    }

    .nome-participante {
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.72);
      padding: 18px 36px;
      border-radius: 999px;
      font-size: 34px;
      font-weight: bold;
      text-align: center;
      max-width: 90vw;
      z-index: 10;
    }

    .aviso-controles {
      position: absolute;
      right: 35px;
      bottom: 25px;
      z-index: 20;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.65);
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 12px;
      border-radius: 999px;
    }

    @media (max-width: 900px) {
      .topo-telao {
        top: 18px;
        left: 20px;
      }

      .topo-telao h1 {
        font-size: 30px;
      }

      .topo-telao p {
        font-size: 18px;
      }

      .controles-tamanho {
        top: auto;
        right: 15px;
        left: 15px;
        bottom: 100px;
        justify-content: center;
      }

      .controles-tamanho button {
        font-size: 13px;
        padding: 9px 12px;
      }

      .nome-participante {
        font-size: 24px;
        padding: 14px 24px;
      }

      .aviso-controles {
        display: none;
      }

      .tamanho-pequeno {
        width: 60vw;
        height: 50vh;
      }

      .tamanho-medio {
        width: 75vw;
        height: 60vh;
      }

      .tamanho-grande {
        width: 88vw;
        height: 70vh;
      }

      .tamanho-cheio {
        width: 95vw;
        height: 78vh;
      }
    }
  </style>
</head>

<body class="body-telao">
  <main class="telao">

    <div class="topo-telao">
      <h1>Ao Vivo no Telão</h1>
      <p id="statusTelao">Aguardando participante...</p>
    </div>

    <div id="controlesTamanho" class="controles-tamanho">
      <button id="btnPequeno" onclick="mudarTamanho('pequeno')">
        Pequeno
      </button>

      <button id="btnMedio" onclick="mudarTamanho('medio')">
        Médio
      </button>

      <button id="btnGrande" onclick="mudarTamanho('grande')">
        Grande
      </button>

      <button id="btnCheio" onclick="mudarTamanho('cheio')">
        Cheio
      </button>

      <button class="btn-ocultar" onclick="ocultarControles()">
        Ocultar
      </button>
    </div>

    <div id="caixaVideo" class="caixa-video tamanho-medio">
      <video
        id="videoRemoto"
        class="video-telao"
        autoplay
        muted
        playsinline
      ></video>
    </div>

    <div id="nomeParticipante" class="nome-participante">
      Nenhum participante selecionado
    </div>

    <div id="avisoControles" class="aviso-controles">
      Teclas: 1 pequeno | 2 médio | 3 grande | 4 cheio | C mostrar/ocultar
    </div>

  </main>

  <script>
    const SERVER_URL = "https://evento-camera-server.onrender.com";

    const socket = io(SERVER_URL, {
      transports: ["websocket", "polling"]
    });

    const videoRemoto = document.getElementById("videoRemoto");
    const statusTelao = document.getElementById("statusTelao");
    const nomeParticipante = document.getElementById("nomeParticipante");
    const caixaVideo = document.getElementById("caixaVideo");
    const controlesTamanho = document.getElementById("controlesTamanho");
    const avisoControles = document.getElementById("avisoControles");

    const btnPequeno = document.getElementById("btnPequeno");
    const btnMedio = document.getElementById("btnMedio");
    const btnGrande = document.getElementById("btnGrande");
    const btnCheio = document.getElementById("btnCheio");

    let pc = null;
    let participanteAtual = null;
    let remoteStream = null;
    let candidatosPendentes = [];

    const iceServers = [
      {
        urls: "stun:stun.l.google.com:19302"
      },
      {
        urls: "stun:stun1.l.google.com:19302"
      },
      {
        urls: "stun:stun2.l.google.com:19302"
      }
    ];

    function mudarTamanho(tamanho) {
      caixaVideo.classList.remove(
        "tamanho-pequeno",
        "tamanho-medio",
        "tamanho-grande",
        "tamanho-cheio"
      );

      caixaVideo.classList.add("tamanho-" + tamanho);

      btnPequeno.classList.remove("ativo");
      btnMedio.classList.remove("ativo");
      btnGrande.classList.remove("ativo");
      btnCheio.classList.remove("ativo");

      if (tamanho === "pequeno") {
        btnPequeno.classList.add("ativo");
      }

      if (tamanho === "medio") {
        btnMedio.classList.add("ativo");
      }

      if (tamanho === "grande") {
        btnGrande.classList.add("ativo");
      }

      if (tamanho === "cheio") {
        btnCheio.classList.add("ativo");
      }

      localStorage.setItem("tamanhoTelao", tamanho);
    }

    function carregarTamanhoSalvo() {
      const tamanhoSalvo = localStorage.getItem("tamanhoTelao") || "medio";
      mudarTamanho(tamanhoSalvo);
    }

    function ocultarControles() {
      controlesTamanho.classList.toggle("oculto");

      if (controlesTamanho.classList.contains("oculto")) {
        avisoControles.textContent =
          "Pressione C para mostrar os controles";
      } else {
        avisoControles.textContent =
          "Teclas: 1 pequeno | 2 médio | 3 grande | 4 cheio | C mostrar/ocultar";
      }
    }

    document.addEventListener("keydown", function(event) {
      const tecla = event.key.toLowerCase();

      if (tecla === "1") {
        mudarTamanho("pequeno");
      }

      if (tecla === "2") {
        mudarTamanho("medio");
      }

      if (tecla === "3") {
        mudarTamanho("grande");
      }

      if (tecla === "4") {
        mudarTamanho("cheio");
      }

      if (tecla === "c") {
        ocultarControles();
      }
    });

    carregarTamanhoSalvo();

    socket.on("connect", function() {
      socket.emit("registrarTelao");

      statusTelao.textContent =
        "Telão conectado. Aguardando seleção do admin.";
    });

    socket.on("disconnect", function() {
      statusTelao.textContent =
        "Telão desconectado do servidor.";
    });

    socket.on("telaoRegistrado", function() {
      statusTelao.textContent =
        "Telão registrado. Aguardando participante...";
    });

    socket.on("iniciarVideo", async function(data) {
      try {
        participanteAtual = data.participante;

        nomeParticipante.textContent = participanteAtual.nome;

        statusTelao.textContent =
          "Conectando com " + participanteAtual.nome + "...";

        await criarConexao(participanteAtual.id);

        const offer = await pc.createOffer();

        await pc.setLocalDescription(offer);

        socket.emit("offer", {
          target: participanteAtual.id,
          offer: offer
        });
      } catch (erro) {
        console.error("Erro ao iniciar vídeo no telão:", erro);

        statusTelao.textContent =
          "Erro ao iniciar vídeo no telão.";
      }
    });

    socket.on("answer", async function(data) {
      try {
        if (!pc) return;

        await pc.setRemoteDescription(
          new RTCSessionDescription(data.answer)
        );

        await processarCandidatosPendentes();

        statusTelao.textContent =
          "Resposta recebida. Aguardando imagem...";
      } catch (erro) {
        console.error("Erro ao receber answer:", erro);
      }
    });

    socket.on("ice-candidate", async function(data) {
      await adicionarCandidato(data.candidate);
    });

    socket.on("usuarioDesconectado", function(id) {
      if (participanteAtual && participanteAtual.id === id) {
        limparTelao();
      }
    });

    socket.on("limparTelao", function() {
      limparTelao();
    });

    async function criarConexao(idParticipante) {
      fecharConexao();

      candidatosPendentes = [];

      pc = new RTCPeerConnection({
        iceServers: iceServers
      });

      remoteStream = new MediaStream();

      videoRemoto.srcObject = remoteStream;

      pc.addTransceiver("video", {
        direction: "recvonly"
      });

      pc.ontrack = async function(event) {
        console.log("Track recebido no telão:", event.track);

        remoteStream.addTrack(event.track);

        videoRemoto.srcObject = remoteStream;

        try {
          await videoRemoto.play();

          statusTelao.textContent =
            "Participante ao vivo.";
        } catch (erro) {
          console.error("Erro ao dar play no vídeo:", erro);

          statusTelao.textContent =
            "Imagem recebida, mas o navegador bloqueou o play.";
        }
      };

      pc.onicecandidate = function(event) {
        if (event.candidate && idParticipante) {
          socket.emit("ice-candidate", {
            target: idParticipante,
            candidate: event.candidate
          });
        }
      };

      pc.onconnectionstatechange = function() {
        if (!pc) return;

        console.log("Estado telão:", pc.connectionState);

        if (pc.connectionState === "connected") {
          statusTelao.textContent =
            "Participante ao vivo.";
        }

        if (pc.connectionState === "failed") {
          statusTelao.textContent =
            "Falha na conexão de vídeo. Tente selecionar novamente.";
        }

        if (pc.connectionState === "disconnected") {
          statusTelao.textContent =
            "Participante desconectado.";
        }
      };

      pc.oniceconnectionstatechange = function() {
        if (!pc) return;

        console.log("ICE telão:", pc.iceConnectionState);
      };
    }

    async function adicionarCandidato(candidate) {
      if (!candidate) return;

      if (
        pc &&
        pc.remoteDescription &&
        pc.remoteDescription.type
      ) {
        try {
          await pc.addIceCandidate(
            new RTCIceCandidate(candidate)
          );
        } catch (erro) {
          console.error("Erro ao adicionar ICE telão:", erro);
        }
      } else {
        candidatosPendentes.push(candidate);
      }
    }

    async function processarCandidatosPendentes() {
      if (!pc) return;

      for (const candidate of candidatosPendentes) {
        try {
          await pc.addIceCandidate(
            new RTCIceCandidate(candidate)
          );
        } catch (erro) {
          console.error("Erro ao processar ICE pendente:", erro);
        }
      }

      candidatosPendentes = [];
    }

    function fecharConexao() {
      if (pc) {
        pc.close();
        pc = null;
      }

      if (remoteStream) {
        remoteStream.getTracks().forEach(function(track) {
          track.stop();
        });

        remoteStream = null;
      }
    }

    function limparTelao() {
      fecharConexao();

      participanteAtual = null;

      videoRemoto.srcObject = null;

      nomeParticipante.textContent =
        "Nenhum participante selecionado";

      statusTelao.textContent =
        "Aguardando participante...";
    }
  </script>
</body>
</html>
